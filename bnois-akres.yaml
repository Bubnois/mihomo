proxy-providers:
  sub-1:
    type: http
    url: "https://github.com/theakres/VPN/raw/main/all.txt"
    interval: 3600
    path: ./providers/sub-1.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

proxy-groups:
  - name: "ext/vps"
    type: select
    use:
      - "sub-1"
    exclude-filter: "(?i)(ru|russia|—А–Њ—Б—Б–Є—П|msk|moscow|–Њ–±—Е–Њ–і|–±–µ–ї—Л–є|–±/—Б)"

  - name: "a/b"
    type: select
    use:
      - "sub-1"
    filter: "(?i)(ru|russia|—А–Њ—Б—Б–Є—П|msk|moscow|–Њ–±—Е–Њ–і|–±–µ–ї—Л–є|–±/—Б)"

rules:
  - DOMAIN-SUFFIX,ru,a/b
  - DOMAIN-SUFFIX,su,a/b
  - DOMAIN-SUFFIX,—А—Д,a/b

  - MATCH,ext/vps
