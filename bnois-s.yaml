name: "bnois ext/a/b"

proxy-providers:
  sub-1:
    type: http
    url: "https://sub.datanode-internal.net/rks2hgA5FRpHlnM0"
    interval: 3600
    path: ./providers/sub-1.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 600

proxy-groups:
  - name: ext/a/b
    type: select
    use:
    - "sub-1"

rules:
  - MATCH,ext/a/b
